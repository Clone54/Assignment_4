<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen text-slate-800">
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section class="mb-10">
            <h1 class="text-2xl font-bold mb-6">Job Application Tracker</h1>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div>
                        <p class="text-slate-500 text-sm font-medium">Total</p>
                        <h3 id="count-total" class="text-2xl font-bold text-slate-900">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div>
                        <p class="text-slate-500 text-sm font-medium">Interview</p>
                        <h3 id="count-interview" class="text-2xl font-bold text-green-600">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div>
                        <p class="text-slate-500 text-sm font-medium">Rejected</p>
                        <h3 id="count-rejected" class="text-2xl font-bold text-red-700">0</h3>
                    </div>
                </div>
            </div>
        </section>

        <section id="available-jobs">
            <div class="flex flex-col justify-between items-start sm:items-center mb-6 gap-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-2xl font-bold">Available Jobs</h2>
                </div>
                <div class="flex bg-slate-200/50 p-1 rounded-xl">
                    <button onclick="switchTab('all')" id="tab-all" class="px-6 py-2 rounded-lg text-sm transition-all tab-active">All Jobs</button>
                    <button onclick="switchTab('interview')" id="tab-interview" class="px-6 py-2 rounded-lg text-sm transition-all text-slate-600 hover:text-indigo-600">Interviews</button>
                    <button onclick="switchTab('rejected')" id="tab-rejected" class="px-6 py-2 rounded-lg text-sm transition-all text-slate-600 hover:text-indigo-600">Rejected</button>
                </div>
            </div>

            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                <h3 class="text-xl font-bold text-slate-700">No Jobs Available</h3>
                <p class="text-slate-500">Your application list for this category is currently empty.</p>
            </div>

            <div id="jobs-container" class="grid grid-cols-1 gap-6">

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
